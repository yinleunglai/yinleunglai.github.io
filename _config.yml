# Site settings
title: Discover a different world
description: by 三撇看看
baseurl: "" 
url: "https://yinleunglai.com" 

# GitHub User settings
username: yinleunglai
github_username: yinleunglai
user_description: 
user_title: 
email: yinleunglai@gmail.com

# Blog Author settings
author:
  name:           yinleunglai
  picture:        
  email:          yinleunglai@gmail.com
  description:    
  twitter:
  facebook:
  github:         https://github.com/yinleunglai
  linkedin:


# markdown
markdown: kramdown
  
kramdown:
 footnote_nr: 1
 entity_output: as_char
 # Jekyll 3 and GitHub Pages now only support rouge for syntax highlighting
 syntax_highlighter: rouge
 syntax_highlighter_opts:
  # Use existing pygments syntax highlighting css
  css_class: 'highlight'
 span:
  line_numbers: false
 block:
  line_numbers: true
  start_line: 1
 
highlighter: rouge
    
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  

permalink: none

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      toc: true
      mathjax: true
      mermaid: false
      highlight: false
      numbering: true
      status: Completed
      protected: false
      commentable: true
      rss: true


exclude:
 - LICENSE.md
 - README.md
 - "*.cdf"
 - "*.nb"
 - "*.bk"
 - "*.draft.md"